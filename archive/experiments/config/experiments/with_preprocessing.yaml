# Experiment: Property chars with full preprocessing
# This config runs property characteristics with winsorization, log transform, and normalization

experiment:
  name: "with_preprocessing"
  description: "Property chars with winsorization, log transform, normalization"

preprocessing:
  features:
    property_chars: true
    census_bg: false
    census_tract: false
    assessed_value: false
    geographic: false
    temporal: true

  steps:
    # Data cleaning
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5
    drop_lowest_ratios: true
    drop_repeat_sales: true

    # Feature engineering
    generate_temporal_features: true
    one_hot_encode: true

    # Outlier handling
    winsorize: true
    winsorize_percentile: 1

    # Target transformation
    log_transform_target: true

    # Scaling
    normalize_continuous: true
    normalize_binary: false

    # Imputation
    impute_method: "median"
    mice_iterations: 3

# Output path (uses templating)
output:
  results_dir: "/scratch/users/salilg/property_tax/results/{experiment_type}/tabpfn_vs_xgb/{experiment_name}/"
