# Experiment: Raw features, no transformations
# This config uses property characteristics but skips winsorization, log transform, and normalization

experiment:
  name: "no_preprocessing"
  description: "Raw features, no transformations (baseline)"

preprocessing:
  features:
    property_chars: true
    census_bg: false
    census_tract: false
    assessed_value: false
    geographic: false
    temporal: true

  steps:
    # Data cleaning (minimal)
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5
    drop_lowest_ratios: true
    drop_repeat_sales: true

    # Feature engineering
    generate_temporal_features: true
    one_hot_encode: true

    # NO outlier handling
    winsorize: false
    winsorize_percentile: 1

    # NO target transformation
    log_transform_target: false

    # NO scaling
    normalize_continuous: false
    normalize_binary: false

    # Simple imputation
    impute_method: "median"
    mice_iterations: 3

# Output path (uses templating)
output:
  results_dir: "/scratch/users/salilg/property_tax/results/{experiment_type}/tabpfn_vs_xgb/{experiment_name}/"
