# Configuration for Cross-County Experiment (Experiment 2)

# Inherits from base_config.yaml

# Test set sampling
test_sampling:
  iterations: 10  # Number of different test samples per county (T)
  test_fraction: 0.2  # 20% of county data
  min_test_samples: 5  # Minimum test samples to draw

# Pooled training
pooled_training:
  tune_per_iteration: true  # Re-tune hyperparameters for each train/test split

# Output settings
output:
  results_dir: "/scratch/users/salilg/property_tax/results/cross_county"
  save_intermediate: true

# SLURM parallelization
# Each array task processes one (county, iteration) pair
slurm:
  max_parallel_jobs: 10  # Can be overridden at runtime
  time_per_job: "2:00:00"  # 2 hours per (county, iteration) pair
  mem_per_job: "64G"  # Larger for pooled data
  cpus_per_task: 8
  gpu_per_task: 1
  partition: "deho"  # Sherlock partition
