# Experiment Config: Property-Only with Evelyn's Preprocessing
# Based on propertyonly-original-20seeds experiment
experiment_name: "propertyonly-original-20seeds"
description: "Property characteristics only with Evelyn's preprocessing (log + winsorize + normalize)"

preprocessing:
  type: "evelyn_propertyonly"  # Uses evelyn_preprocessing_propertyonly.py
  use_log_transform: true  # Log transform is applied in evelyn preprocessing

models:
  - name: "tabpfn"
    enabled: true
    hyperparameters:
      device: "cuda"
  
  - name: "xgboost"
    enabled: true
    hyperparameters:
      n_iter: 10
      cv: 3
      use_gpu: true

experiment_params:
  train_sizes: [25, 50, 75, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000]
  seeds: [0, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900]
  test_type: "full"
  cbg_column: "block_group_id"

paths:
  data_path: "../data/cook_county.csv"
  output_dir: "../results"
  predictions_dir: "/scratch/users/salilg/cook_county_predictions"  # Save predictions to scratch
  log_dir: "../logs"

slurm:
  partition: "deho"
  time: "7-00:00:00"  # 7 days for both models
  cpus_per_task: 8
  mem: "48G"
  gres: "gpu:1"  # GPU for both TabPFN and XGBoost
  account: null

environment:
  python_module: "python/3.12"
  cuda_module: "cuda"
  venv_path: "/scratch/users/salilg/envs/tabpfn_env/.venv/bin/activate"

metadata:
  date: "2025-01-15"
  tags: ["property-only", "evelyn-preprocessing"]
  notes: "Property characteristics only (char_* features) with Evelyn's preprocessing pipeline (log + winsorize + normalize)"

