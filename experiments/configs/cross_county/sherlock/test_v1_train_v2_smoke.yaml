# Cross-County Experiment: SMOKE TEST
#
# Minimal configuration for debugging and validation
# Based on test_v1_train_v1 but with minimal resources:
# - Only 2 tiny counties
# - Reduced XGBoost Optuna trials
# - Same pipeline structure as production config
#
# Use this to validate:
# - Environment setup (modules, packages, CUDA)
# - Data loading and preprocessing pipeline
# - Model training workflow
# - Output generation
#
# Expected runtime: 2-5 minutes

experiment:
  type: "cross_county"
  name: "test_v1_train_v2_smoke"
  description: "SMOKE TEST: Minimal 2-county validation run"
  random_seed: 42

# ==============================================================================
# DATA
# ==============================================================================
data:
  cleaned_data_path: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"

# ==============================================================================
# SPLITS (Pre-generated - RECOMMENDED FOR SMOKE TEST)
# ==============================================================================
# Use existing pre-generated splits to avoid loading 50GB data.parquet
splits:
  test_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/"
  train_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/train_v2/"

# Alternative: Generate splits on-the-fly (requires 50GB+ memory)
# test_set_config: "experiments/configs/test_sets/test_smoke.yaml"
# train_set_config: "experiments/configs/train_sets/train_smoke.yaml"

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
# Applied per train/test split: fit on train, transform both
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

xgboost:
  optuna_trials: 2          # Reduced from 50 for smoke test
  optuna_cv_folds: 2        # Reduced from 3 for smoke test
  use_gpu: true

# TabPFN configuration
tabpfn:
  version: "v2"  # Options: "v2", "v2.5"
  device: "cuda"   # Options: "cuda", "cpu"

# ==============================================================================
# EVALUATION
# ==============================================================================
metrics:
  - r2
  - mae
  - rmse

# Stratify results by test county size bucket
evaluation:
  stratify_by_size_bucket: true

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/scratch/users/salilg/property_tax/results/cross_county/test_v1_train_v2_smoke/"

# ==============================================================================
# DEBUG (For smoke test only - limits data size)
# ==============================================================================
debug:
  sample_size: 1000  # Only use first 1000 rows from each split (test and train)

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
  save_split_info: true
  save_per_county_results: true
