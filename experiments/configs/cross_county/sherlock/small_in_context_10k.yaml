# Cross-county in-context learning experiment configuration
# Tests TabPFN with 10K in-context examples on 10K test samples from small counties

# Experiment metadata
experiment:
  type: "cross_county"
  name: "small_in_context_10k"
  description: "10K in-context learning with small test counties"
  repetitions: 10
  random_seed: 42
  n_jobs: 4

# Data paths
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/county_row_counts.csv"
  target_column: "SALE_AMOUNT"

# Custom sampling strategy for 10K in-context experiment
sampling:
  strategy: "small_county_in_context"
  parameters:
    # Small county metadata
    small_county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/small_county_metadata.csv"
    all_county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/county_row_counts.csv"

    # Sampling parameters
    n_small_counties: 50                    # Number of small counties for test
    small_county_test_ratio: 0.5            # 50% of small counties for test, 50% for in-context
    target_train_size: 10000                # Target in-context set size
    target_test_size: 10000                 # Target test set size
    other_county_train_ratio: 0.05           # Sample 20% from other counties for in-context
    remaining_county_test_ratio: 0.05      # Sample 10% from remaining counties for test

# Experiment parameters
iterations: 10                # Number of random splits (iterations)

# Data filtering (optional - to restrict to specific counties and features)
# Uncomment and configure to enable filtering
data_filtering:
  counties:
    enabled: true
    source: "file"  # or "inline"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/county_metadata/high_coverage_87_county_list.csv"
    # Alternative: inline list
    # list: [1001, 1003, 1005, ...]
  features:
    enabled: true
    source: "file"  # or "inline"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/feature_lists/high_coverage__87_county_features.csv"
    # Alternative: inline list
    # list: ["char_bldg_sf", "char_yrblt", "sale_month", ...]

# Preprocessing options
preprocessing:
  # Feature selection
  features:
    property_chars: true
    census_bg: false
    census_tract: false
    assessed_value: false
    geographic: false
    temporal: true

  # Preprocessing steps
  steps:
    # Data cleaning
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5
    drop_lowest_ratios: true
    drop_repeat_sales: true
    clean_bad_columns: true

    # Feature engineering
    generate_temporal_features: true
    one_hot_encode: true

    # Outlier handling
    winsorize: true
    winsorize_percentile: 1

    # Target transformation
    log_transform_target: true

    # Scaling
    normalize_continuous: true

    # Imputation
    impute_method: "median"

# Models to evaluate
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

# XGBoost hyperparameter tuning
xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

# TabPFN configuration
tabpfn:
  version: "v2"  # Options: "v2", "v2.5"
  device: "cuda"   # Options: "cuda", "cpu"

# Evaluation metrics
metrics:
  - r2
  - mae
  - rmse
  - mape

# Output
output:
  results_dir: "/scratch/users/salilg/property_tax/results/cross_county/small_in_context_10k_high_coverage_87_counties/"

# Logging
logging:
  level: "INFO"
  save_fold_level_results: true
  log_hyperparameters: true

# Predictions storage
predictions:
  save_predictions: false
  predictions_format: "parquet"

# Calibration settings (optional)
calibration:
  enabled: false
  quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]
  models: ["tabpfn"]
