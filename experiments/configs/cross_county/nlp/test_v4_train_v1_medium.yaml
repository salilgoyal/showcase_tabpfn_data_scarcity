# Cross-County Experiment: test_v4 + train_v1 (MEDIUM counties only)
#
# Same as test_v4_train_v1 but filtered to only medium counties.
# Both training and evaluation use only medium-bucket counties.

experiment:
  type: "cross_county"
  name: "test_v4_train_v1_medium"
  description: "Pooled training on medium counties only, evaluate on medium counties"
  random_seed: 42

# ==============================================================================
# DATA
# ==============================================================================
data:
  cleaned_data_path: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"

# ==============================================================================
# SPLITS (Pre-generated - same splits, filtered at runtime)
# ==============================================================================
splits:
  test_set_dir: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/test_v4/"
  train_set_dir: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/test_v4/train_v1/"

# Filter to only medium counties (both train and test)
filter_buckets:
  - "medium"

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

# ==============================================================================
# FEATURES
# ==============================================================================
features:
  onehot_fips: true

# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

# ==============================================================================
# BASELINE
# ==============================================================================
baseline:
  enabled: true

# ==============================================================================
# EVALUATION
# ==============================================================================
metrics:
  - r2
  - mae
  - rmse
  - mape

evaluation:
  stratify_by_size_bucket: true

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/nlp/scr/salilg/property_tax/results/cross_county/test_v4_train_v1_medium/"

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
  save_split_info: true
  save_per_county_results: true
