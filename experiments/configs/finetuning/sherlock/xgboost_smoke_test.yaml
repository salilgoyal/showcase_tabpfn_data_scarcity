# XGBoost Smoke Test Configuration
#
# Quick test config for debugging - uses small dataset and minimal Optuna trials
# Perfect for interactive sessions to catch errors quickly
#
# Usage: Run interactively on GPU node to test before submitting full job

# ==============================================================================
# EXPERIMENT METADATA
# ==============================================================================
experiment:
  type: "finetuning"
  name: "xgboost_smoke_test"
  description: "Quick XGBoost test with train_v2 (10K samples, 3 Optuna trials)"
  random_seed: 42
  train_version: "train_v2"  # Small: 10K samples

# ==============================================================================
# DATA (Pre-generated cleaned datasets)
# ==============================================================================
data:
  cleaned_data_path: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"

# ==============================================================================
# SPLITS (Pre-generated - RECOMMENDED)
# ==============================================================================
splits:
  test_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/"
  train_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/{train_version}/"

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

# ==============================================================================
# XGBOOST CONFIGURATION (Minimal for smoke test)
# ==============================================================================
xgboost:
  optuna_trials: 3          # Minimal trials for quick testing
  optuna_cv_folds: 2        # 2-fold CV for speed
  use_gpu: true             # Test GPU support

# ==============================================================================
# TABPFN CONFIGURATION (Disabled)
# ==============================================================================
tabpfn:
  version: "v2"
  device: "cuda"

# ==============================================================================
# TABPFN FINE-TUNING CONFIGURATION (v2 - Yandex approach)
# ==============================================================================
finetuning:
  # Implementation: "v2" = Yandex-style direct finetuning (recommended)
  implementation: "v2"

  # Validation split
  val_fraction: 0.2

  # Learning rate (Yandex paper uses ~1.8e-4, we use 1e-4 as safe default)
  learning_rate: 1e-4
  n_lr_warmup_epochs: 0           # No warmup by default
  weight_decay: 0.0

  # Training settings (match Yandex defaults)
  max_epochs: 100
  batch_size: 1                   # Number of independent ICL tasks per step
  epoch_size: 10                  # Steps per epoch (Yandex default)
  seq_len_pred: 1024              # Query samples per step (Yandex default)
  gradient_clip: 1.0              # Gradient norm clipping

  # Early stopping (Yandex default)
  patience: 16

  # Finetuning mode
  finetune_mode: "full"           # Full model finetuning
  target_transform: null          # null, "power", or "quantile"
  softmax_temperature: 0.9

  # Mixed precision (bfloat16 on A100)
  use_amp: true

  # Evaluation
  eval_batch_size: 4096

  # Checkpoint
  checkpoint_path: null           # Auto-download TabPFN v2 checkpoint
# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: false  # Disabled - XGBoost only
  - name: "xgboost"
    enabled: true

# ==============================================================================
# BASELINE
# ==============================================================================
baseline:
  enabled: true

# ==============================================================================
# EVALUATION
# ==============================================================================
metrics:
  - r2
  - mae
  - rmse
  - mape

evaluation:
  stratify_by_size_bucket: true

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/scratch/users/salilg/property_tax/results/finetuning/smoke_test/"
  checkpoint_dir: "/scratch/users/salilg/property_tax/checkpoints/finetuning/smoke_test/"

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
  save_split_info: true
  save_per_county_results: false

# ==============================================================================
# PREDICTIONS & CALIBRATION
# ==============================================================================
predictions:
  save_predictions: true
  predictions_format: "parquet"

calibration:
  enabled: false
  quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]

# ==============================================================================
# IN-CONTEXT LEARNING (Not applicable)
# ==============================================================================
in_context:
  dataset_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/train_v2/"
  n_samples: null
