# Fine-tuning Experiment Configuration
#
# Fine-tune TabPFN using gradient descent on pre-generated test/train datasets
# This uses the same data structure as cross-county experiments, but with
# TabPFN gradient updates instead of in-context learning.
#
# Recommended dataset: test_v1_train_v1 (~360K samples, good for fine-tuning)

# ==============================================================================
# EXPERIMENT METADATA
# ==============================================================================
experiment:
  type: "finetuning"
  name: "tabpfn_finetuning_{train_version}"
  description: "Fine-tune TabPFN with gradient descent on test_v1_{train_version}"
  random_seed: 42

  # CHANGE THIS to switch train sets (e.g., train_v2, train_v5, train_v6)
  train_version: "train_v5"

# ==============================================================================
# DATA (Pre-generated cleaned datasets)
# ==============================================================================
data:
  cleaned_data_path: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"

# ==============================================================================
# SPLITS (Pre-generated - RECOMMENDED)
# ==============================================================================
# Use pre-generated splits to avoid loading 50GB data.parquet
splits:
  test_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/"
  train_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/{train_version}/"

# Alternative: Generate splits on-the-fly (requires 50GB+ memory)
# test_set_config: "experiments/configs/test_sets/test_v1.yaml"
# train_set_config: "experiments/configs/train_sets/train_v2.yaml"

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
# Applied per train/test split: fit on train, transform both
# (Phase 1 preprocessing was already applied during data cleaning)
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1       # Winsorize at 1st/99th percentile
    normalize_continuous: true    # Standardize continuous features
    impute_method: "median"       # Impute missing values with median

# ==============================================================================
# TABPFN FINE-TUNING CONFIGURATION
# ==============================================================================
finetuning:
  # Implementation: "v2" = Yandex-style direct finetuning (recommended)
  #                 "v1" = Legacy high-level API (broken optimizer refs)
  implementation: "v2"

  # Validation split (split train data into train+val)
  val_fraction: 0.2               # 20% of train data for validation

  # Learning rate settings
  learning_rate: 1e-4             # Yandex paper uses ~1.8e-4, 1e-4 is safe default
  n_lr_warmup_epochs: 0           # Number of warmup epochs (0 = no warmup)
  weight_decay: 0.0               # L2 regularization

  # Training settings
  max_epochs: 100                 # Maximum number of epochs
  batch_size: 1                   # Number of independent ICL tasks per step
  gradient_clip: 1.0              # Gradient norm clipping
  epoch_size: 10                  # Steps per epoch (Yandex default)
  seq_len_pred: 1024              # Query samples per step

  # Early stopping
  patience: 16                    # Match Yandex default

  # Finetuning mode
  finetune_mode: "full"           # "full", "embeds", "head"
  target_transform: null          # null, "power", or "quantile"
  softmax_temperature: 0.9        # For regression prediction

  # Mixed precision (recommended for A100)
  use_amp: true                   # Use automatic mixed precision (bfloat16)

  # Evaluation
  eval_batch_size: 4096           # Batch size for validation/test prediction

  # Checkpoint
  checkpoint_path: null           # Path to tabpfn-v2-regressor.ckpt (null = auto-download)

  # Legacy v1 settings (only used when implementation: "v1")
  # learning_rate_schedule: "cosine"
  # warmup_epochs: 2
  # gradient_accumulation_steps: 8
  # max_data_size: 2000
  # min_delta: 1e-5
  # dropout: 0.0
  # val_batch_size: 1000
  # eval_every_n_epochs: 1
  # save_checkpoints: true

# ==============================================================================
# XGBOOST CONFIGURATION
# ==============================================================================
xgboost:
  optuna_trials: 20               # Number of Optuna trials for hyperparameter tuning
  optuna_cv_folds: 3              # Number of CV folds for Optuna
  use_gpu: true                   # Use GPU for XGBoost training

  # Optional: fixed hyperparameters (uncomment to skip Optuna tuning)
  # fixed_params:
  #   max_depth: 8
  #   learning_rate: 0.1
  #   n_estimators: 500
  #   subsample: 0.8
  #   colsample_bytree: 0.8

# ==============================================================================
# TABPFN CONFIGURATION
# ==============================================================================
tabpfn:
  version: "v2"  # Options: "v2", "v2.5"
  device: "cuda"   # Options: "cuda", "cpu"

# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

# ==============================================================================
# BASELINE
# ==============================================================================
# Baseline uses county assessments (CALCULATED_TOTAL_VALUE) adjusted by
# median ratio computed on training data
baseline:
  enabled: true  # Set to false to skip baseline comparison

# ==============================================================================
# EVALUATION
# ==============================================================================
metrics:
  - r2
  - mae
  - rmse
  - mape

# Stratify results by test county size bucket
evaluation:
  stratify_by_size_bucket: true

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/scratch/users/salilg/property_tax/results/finetuning/test_v1_{train_version}/"
  checkpoint_dir: "/scratch/users/salilg/property_tax/checkpoints/finetuning/{train_version}/"

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
  save_split_info: true
  save_per_county_results: false  # Set to true to save per-county breakdowns

# ==============================================================================
# PREDICTIONS & CALIBRATION
# ==============================================================================
predictions:
  save_predictions: true          # Set to true to save predictions (required for per-county metrics)
  predictions_format: "parquet"   # "parquet" or "npy"

calibration:
  enabled: false                  # Set to true to compute calibration metrics
  quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]

# ==============================================================================
# IN-CONTEXT LEARNING (for fine-tuned TabPFN predictions)
# ==============================================================================
in_context:
  # Path to pre-generated dataset to use as in-context examples
  # This should be a train set directory containing train_indices.npy
  # Example: /scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/train_v2/
  dataset_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v1/train_v2/"

  # Number of samples to use from the dataset (null = use all)
  n_samples: null                 # Use all samples from train_v2 (10K)
