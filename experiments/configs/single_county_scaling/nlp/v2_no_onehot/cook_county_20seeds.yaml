# Single-County Data Scaling: Cook County (FIPS 17031)
#
# Replicates the original Cook County data scarcity experiment:
# - Fix one county (Cook County)
# - Temporal train/test split (oldest 80% train pool, most recent 20% test)
# - Sweep training sizes from 25 to 10,000
# - 20 random seeds per training size
# - Compare TabPFN vs XGBoost
#
# Usage:
#   sbatch experiments/slurm/nlp/single_county_scaling.sh \
#     experiments/configs/single_county_scaling/nlp/v2_no_onehot/cook_county_20seeds.yaml

experiment:
  type: "single_county_scaling"
  name: "cook_county_20seeds"
  description: "Cook County data scaling: 22 train sizes x 20 seeds, TabPFN vs XGBoost"
  random_seed: 42

data:
  cleaned_data_path: "/nlp/scr/salilg/showcase_property_tax/preprocessed/v2_no_onehot/"
  target_column: "SALE_AMOUNT"

single_county_scaling:
  county_fips: 17031  # Cook County, IL
  temporal_split: true
  temporal_column: "sale_day"  # Days since 2000-01-01
  test_fraction: 0.2

  train_sizes:
    - 25
    - 50
    - 75
    - 100
    - 200
    - 300
    - 400
    - 500
    - 600
    - 700
    - 800
    - 900
    - 1000
    - 2000
    - 3000
    - 4000
    - 5000
    - 6000
    - 7000
    - 8000
    - 9000
    - 10000

  seeds:
    - 0
    - 100
    - 200
    - 300
    - 400
    - 500
    - 600
    - 700
    - 800
    - 900
    - 1000
    - 1100
    - 1200
    - 1300
    - 1400
    - 1500
    - 1600
    - 1700
    - 1800
    - 1900

  save_interval: 20  # Save intermediate results every 20 (seed, train_size) combos

preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

ratio_filter:
  enabled: true
  drop_bottom_percentile: 5
  drop_top_percentile: 0
  by_sale_year: true

models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

xgboost:
  optuna_trials: 10
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

metrics:
  - r2
  - mae
  - rmse
  - mape

output:
  results_dir: "/nlp/scr/salilg/showcase_property_tax/results/single_county_scaling/v2_no_onehot/cook_county_20seeds/"

logging:
  level: "INFO"
