# Geographic Pooling Experiment: test_v4, tiny counties
#
# For each tiny test county:
#   - Use all of the county's own historical data
#   - Add neighbor data: 0.8x the county's own training size, from nearest counties
#   - Train per-county TabPFN + XGBoost models
#
# Neighbor pool is restricted to other test_v4 counties (no extra data loading).

experiment:
  type: "geo_pooling"
  name: "test_v4_geo_tiny"
  description: "Per-county geo pooling on tiny counties, neighbor_ratio=0.8"
  random_seed: 42

# ==============================================================================
# DATA
# ==============================================================================
data:
  cleaned_data_path: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"
  project_root: "/sailhome/salilg/tabpfn_data_scarcity"

# ==============================================================================
# SPLITS (reuse test_v4)
# ==============================================================================
splits:
  test_set_dir: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/test_v4/"

# Only process tiny counties
filter_buckets:
  - "tiny"

# ==============================================================================
# GEOGRAPHIC POOLING
# ==============================================================================
geo_pooling:
  centroids_csv: "data/us_county_latlng.csv"
  max_k_neighbors: 20          # Consider up to 20 nearest counties
  max_distance_miles: null      # No hard distance cutoff
  neighbor_budget_ratio: 0.8    # Add 0.8x own data from neighbors
  # neighbor_budget_fixed: null # Alternative: fixed count instead of ratio
  max_samples_per_neighbor: null # No per-neighbor cap
  max_total_training_size: null  # Cap on own + neighbor combined (e.g. 10000 for TabPFN limit)

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

# ==============================================================================
# CHECKPOINTING
# ==============================================================================
checkpointing:
  enabled: true
  interval: 10     # Checkpoint every 10 counties
  resume: true

# ==============================================================================
# EVALUATION
# ==============================================================================
metrics:
  - r2
  - mae
  - rmse
  - mape

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/nlp/scr/salilg/property_tax/results/geo_pooling/test_v4_geo_tiny/"

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
