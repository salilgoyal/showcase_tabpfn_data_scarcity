# Geographic Pooling Experiment: test_v4_rand_s0, all counties (tiny + small + medium)
#
# Identical to test_v4_k40_nopooling_droplowest5 but uses random-split test set seed 0.

experiment:
  type: "geo_pooling"
  name: "test_v4_rand_s0_geo_k40_nopooling_droplowest5"
  description: "Per-county geo pooling, random split seed 0, max_k_neighbors=40, neighbor_ratio=0 (NO POOLING), drop lowest 5%"
  random_seed: 42

data:
  cleaned_data_path: "/nlp/scr/salilg/showcase_property_tax/preprocessed/v2_no_onehot/"
  target_column: "SALE_AMOUNT"
  project_root: "/sailhome/salilg/showcase_tabpfn_data_scarcity"

splits:
  test_set_dir: "/nlp/scr/salilg/showcase_property_tax/preprocessed/v2_no_onehot/test_v4_rand_s0/"

geo_pooling:
  centroids_csv: "data/us_county_latlng.csv"
  max_k_neighbors: 40
  max_distance_miles: null
  neighbor_budget_ratio: 0  # NO POOLING, REGARDLESS OF OTHER PARAMS HERE
  max_samples_per_neighbor: null
  max_total_training_size: 10000
  restrict_neighbors_to_same_size_bucket: false

preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

ratio_filter:
  enabled: true
  drop_bottom_percentile: 5
  drop_top_percentile: 0
  by_sale_year: true

models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: false

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

checkpointing:
  enabled: true
  interval: 10
  resume: true

metrics:
  - r2
  - mae
  - rmse
  - mape

output:
  results_dir: "/nlp/scr/salilg/showcase_property_tax/results/geo_pooling/v2_no_onehot/test_v4_rand_s0_geo_k40_nopooling_droplowest5/"

logging:
  level: "INFO"
