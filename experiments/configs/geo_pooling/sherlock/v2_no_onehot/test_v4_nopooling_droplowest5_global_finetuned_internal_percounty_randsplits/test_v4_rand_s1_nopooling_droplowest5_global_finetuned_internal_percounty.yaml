# Geographic Pooling with Per-County Finetuned TabPFN — No Neighbor Pooling (rand split seed 1) — Sherlock
#
# Identical to test_v4_nopooling_droplowest5_global_finetuned_internal_percounty but
# uses random-split test set seed 1. Run alongside seeds 0-4 to measure
# variability from the test set split choice.
#
# Usage:
#   sbatch --array=0-3 experiments/slurm/sherlock/geo_pooling.sh \
#     experiments/configs/geo_pooling/sherlock/v2_no_onehot/test_v4_nopooling_droplowest5_global_finetuned_internal_percounty_randsplits/test_v4_rand_s1_nopooling_droplowest5_global_finetuned_internal_percounty.yaml

experiment:
  type: "geo_pooling"
  name: "test_v4_rand_s1_geo_nopooling_droplowest5_global_finetuned_internal_percounty"
  description: "No-pooling baseline with per-county finetuned TabPFN, random split seed 1, drop lowest 5%"
  random_seed: 42

data:
  cleaned_data_path: "/scratch/users/salilg/property_tax/preprocessed/v2_no_onehot/"
  target_column: "SALE_AMOUNT"
  project_root: "/home/users/salilg/tabpfn_data_scarcity"

splits:
  test_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v2_no_onehot/test_v4_rand_s1/"

geo_pooling:
  centroids_csv: "data/us_county_latlng.csv"
  max_k_neighbors: 40
  max_distance_miles: null
  neighbor_budget_ratio: 0
  max_samples_per_neighbor: null
  max_total_training_size: 10000
  restrict_neighbors_to_same_size_bucket: false

preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

ratio_filter:
  enabled: true
  drop_bottom_percentile: 5
  drop_top_percentile: 0
  by_sale_year: true

models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true
  - name: "tabpfn_global_finetuned"
    enabled: true
    checkpoint_dir: "/scratch/users/salilg/property_tax/results/global_finetuning/v2_no_onehot/internal_15k_percounty/"

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

checkpointing:
  enabled: true
  interval: 10
  resume: true

metrics:
  - r2
  - mae
  - rmse
  - mape

output:
  results_dir: "/scratch/users/salilg/property_tax/results/geo_pooling/v2_no_onehot/test_v4_rand_s1_geo_nopooling_droplowest5_global_finetuned_internal_percounty/"

logging:
  level: "INFO"
