# Geographic Pooling Experiment: test_v4, tiny counties (Sherlock)

experiment:
  type: "geo_pooling"
  name: "test_v4_geo_tiny"
  description: "Per-county geo pooling on tiny counties, neighbor_ratio=0.8"
  random_seed: 42

data:
  cleaned_data_path: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"
  project_root: "/home/users/salilg/tabpfn_data_scarcity"

splits:
  test_set_dir: "/scratch/users/salilg/property_tax/preprocessed/v1_no_onehot/test_v4/"

# the default for filter_buckets is ['tiny', 'small', 'medium'] — 
# so if you omit it from the config, all three buckets are both evaluated and available as neighbors. 
filter_buckets:
  - "tiny"

geo_pooling:
  centroids_csv: "data/us_county_latlng.csv"
  max_k_neighbors: 20
  max_distance_miles: null
  neighbor_budget_ratio: 0.8
  max_samples_per_neighbor: null
  max_total_training_size: null  # Cap on own + neighbor combined (e.g. 10000 for TabPFN limit)

preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

tabpfn:
  version: "v2"
  device: "cuda"

checkpointing:
  enabled: true
  interval: 10
  resume: true

metrics:
  - r2
  - mae
  - rmse
  - mape

output:
  results_dir: "/scratch/users/salilg/property_tax/results/geo_pooling/test_v4_geo_tiny/"

logging:
  level: "INFO"
