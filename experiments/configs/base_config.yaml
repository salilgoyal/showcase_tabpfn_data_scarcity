# Base configuration for all experiments

# Experiment metadata (overridden by experiment configs)
experiment:
  name: "default"
  description: ""

# Data paths
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/county_row_counts.csv"
  target_column: "SALE_AMOUNT"

# Preprocessing options
preprocessing:
  # Feature selection (what to include)
  features:
    property_chars: true        # char_* columns (~90-110 features)
    census_bg: false            # census_*_bg (15 features)
    census_tract: false         # census_*_tract (15 features)
    assessed_value: false       # CALCULATED_TOTAL_VALUE
    geographic: false           # latitude, longitude
    temporal: true              # sale_year, sale_month, etc. (auto-generated)

  # Preprocessing steps (what transformations to apply)
  steps:
    # Data cleaning
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5         # Require 50% non-null to keep column
    drop_lowest_ratios: true
    drop_repeat_sales: true
    clean_bad_columns: true     # Remove problematic columns after split

    # Feature engineering
    generate_temporal_features: true  # Generate year, month, day, etc. from sale_date
    one_hot_encode: true

    # Outlier handling
    winsorize: true
    winsorize_percentile: 1     # Winsorize at 1st/99th percentile

    # Target transformation
    log_transform_target: true

    # Scaling
    normalize_continuous: true

    # Imputation
    impute_method: "median"     # Options: "median", "mean", "none"

# County size bins
county_bins:
  - name: "small"
    min_size: 10
    max_size: 100
    k_folds: 5

# Experiment settings
experiment:
  repetitions: 10
  random_seed: 42
  n_jobs: 4  # CPU cores for parallel processing within a job

# Models to evaluate
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

# XGBoost hyperparameter tuning
xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

# Evaluation metrics
metrics:
  - r2
  - mae
  - rmse

# Logging
logging:
  level: "INFO"
  save_fold_level_results: true
  log_hyperparameters: true

# Predictions storage (NEW: for individual-level prediction analysis)
predictions:
  save_predictions: false      # Enable to save individual predictions per fold
  predictions_format: "parquet"  # Options: "parquet", "pickle"
