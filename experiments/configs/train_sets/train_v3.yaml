# Train Set v3: External counties only (random)
#
# Strategy:
# - Use ONLY data from external counties (not in test set)
# - Random sampling across all external counties
# - No test county data at all
#
# Research question:
# - How well does the model generalize to completely unseen counties?
# - Tests pure cross-county transfer learning
#
# Expected behavior:
# - Hardest generalization scenario (no county-specific info)
# - Performance depends on transferability of learned patterns
# - Should work equally well/poorly across all test counties

version: "train_v3"
description: "External counties only (random sampling, pure cross-county)"

# Data sources
data_sources:
  # Historical data from test counties
  test_counties_historical:
    enabled: false        # Disabled - pure cross-county

  # External counties (not in test set)
  external_counties:
    enabled: true
    sampling_strategy: "random"   # Random sample from all external counties
    n_counties: null              # null = sample from all external counties
    fraction: 1.0                 # Use 100% of budget for external data

# Sampling configuration
sampling:
  max_samples: 10000           # Cap at 10K for TabPFN compatibility
  max_samples_per_county: 200  # Max samples from any single county (for diversity)

# Output options
output:
  save_train_statistics: true
  save_county_distribution: true

