# Train Set v5: Large-scale training (for fine-tuning experiments)
#
# Strategy:
# - Use 500K samples total (50% test-county history, 50% external)
# - Max 1000 samples per county for diversity
#
# Research question:
# - How does model performance scale with training data size?
# - What is the ceiling for cross-county transfer?
#
# Expected behavior:
# - Suitable for XGBoost and fine-tuned TabPFN
# - NOT suitable for vanilla TabPFN (10K limit)
# - Best for understanding large-scale transfer learning

version: "train_v5"
description: "Large-scale: 500K samples (50% test-county history, 50% external)"

# Data sources
data_sources:
  # Historical data from test counties
  test_counties_historical:
    enabled: true
    fraction: 0.5         # Use 50% of budget for test county history

  # External counties
  external_counties:
    enabled: true
    sampling_strategy: "random"   # Random sample from all external counties
    n_counties: null              # null = sample from all external counties
    fraction: 0.5                 # 50% of budget for external data

# Sampling configuration
sampling:
  max_samples: 500000           # Cap at 500K for large-scale fine-tuning
  max_samples_per_county: 1000  # Max samples from any single county (for diversity)

# Output options
output:
  save_train_statistics: true
  save_county_distribution: true
