# Calibration Experiment: TabPFN with Full Preprocessing
# Evaluates calibration quality of TabPFN predictions

experiment:
  type: "within_county"
  name: "calibration_tabpfn_full"
  description: "TabPFN calibration analysis with full preprocessing"
  repetitions: 10
  random_seed: 42
  n_jobs: 4

# Data paths
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/county_row_counts.csv"
  target_column: "SALE_AMOUNT"

# County bins
county_bins:
  - name: "small"
    min_size: 10
    max_size: 100
    k_folds: 5

# Full preprocessing
preprocessing:
  features:
    property_chars: true
    census_bg: false
    census_tract: false
    assessed_value: false
    geographic: false
    temporal: true

  steps:
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5
    drop_lowest_ratios: true
    drop_repeat_sales: true
    clean_bad_columns: true
    generate_temporal_features: true
    one_hot_encode: true
    winsorize: true
    winsorize_percentile: 1
    log_transform_target: true
    normalize_continuous: true
    impute_method: "median"

# Models - TabPFN only for calibration
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: false

# XGBoost config (not used)

# TabPFN configuration
tabpfn:
  version: "v2"  # Options: "v2", "v2.5"
  device: "cuda"   # Options: "cuda", "cpu"
xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

# Metrics
metrics:
  - r2
  - mae
  - rmse

# Logging
logging:
  level: "INFO"
  save_fold_level_results: true
  log_hyperparameters: true

# Predictions
predictions:
  save_predictions: false
  predictions_format: "parquet"

# Calibration - ENABLED
calibration:
  enabled: true
  quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]
  models: ["tabpfn"]

# Output
output:
  results_dir: "/scratch/users/salilg/property_tax/results/calibration/calibration_tabpfn_full/"
