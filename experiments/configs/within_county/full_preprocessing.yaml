# Within-County CV Experiment: Full Preprocessing
# Tests model performance with repeated k-fold CV within a single county

experiment:
  type: "within_county"
  name: "within_county_full_preprocessing"
  description: "Within-county repeated k-fold CV with full preprocessing"
  repetitions: 10
  random_seed: 42
  n_jobs: 4

# Data paths
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/county_row_counts.csv"
  target_column: "SALE_AMOUNT"

# County size bins (for reference - actual FIPS passed via CLI)
county_bins:
  - name: "small"
    min_size: 10
    max_size: 100
    k_folds: 5

# Preprocessing with full pipeline
preprocessing:
  features:
    property_chars: true
    census_bg: false
    census_tract: false
    assessed_value: false
    geographic: false
    temporal: true

  steps:
    # Data cleaning
    drop_null_labels: true
    drop_single_value_cols: true
    drop_mostly_null_cols: true
    share_non_null: 0.5
    drop_lowest_ratios: true
    drop_repeat_sales: true
    clean_bad_columns: true

    # Feature engineering
    generate_temporal_features: true
    one_hot_encode: true

    # Outlier handling
    winsorize: true
    winsorize_percentile: 1

    # Target transformation
    log_transform_target: true

    # Scaling
    normalize_continuous: true

    # Imputation
    impute_method: "median"

# Models to evaluate
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

# XGBoost hyperparameter tuning

# TabPFN configuration
tabpfn:
  version: "v2"  # Options: "v2", "v2.5"
  device: "cuda"   # Options: "cuda", "cpu"
xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

# Evaluation metrics
metrics:
  - r2
  - mae
  - rmse

# Logging
logging:
  level: "INFO"
  save_fold_level_results: true
  log_hyperparameters: true

# Predictions storage
predictions:
  save_predictions: false
  predictions_format: "parquet"

# Calibration (optional)
calibration:
  enabled: false
  quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]
  models: ["tabpfn"]

# Output
output:
  results_dir: "/scratch/users/salilg/property_tax/results/within_county/within_county_full_preprocessing/"
