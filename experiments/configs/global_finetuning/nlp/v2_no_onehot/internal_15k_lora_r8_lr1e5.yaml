# Global Finetuning: LoRA (rank=8) + LR 1e-5
#
# Combines LoRA (freeze base, train low-rank adapters) with a lower learning
# rate. Both helped independently; this tests whether combining them is better.
#
# Usage:
#   sbatch experiments/slurm/nlp/global_finetuning.sh \
#     experiments/configs/global_finetuning/nlp/v2_no_onehot/internal_15k_lora_r8_lr1e5.yaml

experiment:
  type: "global_finetuning"
  name: "global_ft_internal_15k_lora_r8_lr1e5"
  description: "Global TabPFN finetuning with LoRA r=8 + lr=1e-5"
  random_seed: 42

data:
  cleaned_data_path: "/nlp/scr/salilg/property_tax/preprocessed/v2_no_onehot/"
  target_column: "SALE_AMOUNT"
  project_root: "/sailhome/salilg/tabpfn_data_scarcity"

global_finetuning:
  variant: "internal"
  n_samples: 15000
  sampling_strategy: "uniform"

splits:
  test_set_dir: "/nlp/scr/salilg/property_tax/preprocessed/v2_no_onehot/test_v4/"

preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

ratio_filter:
  enabled: true
  drop_bottom_percentile: 5
  drop_top_percentile: 0
  by_sale_year: true

finetuning:
  learning_rate: 1e-5
  weight_decay: 0.0
  max_epochs: 100
  patience: 16
  epoch_size: 10
  seq_len_pred: 1024
  max_context_size: 10000
  batch_size: 1
  gradient_clip: 1.0
  use_amp: true
  finetune_mode: "lora"
  lora_rank: 8
  lora_alpha: 16
  target_transform: null
  checkpoint_path: null
  softmax_temperature: 0.9
  val_fraction: 0.2
  eval_batch_size: 4096
  device: "cuda"

output:
  checkpoint_dir: "/nlp/scr/salilg/property_tax/results/global_finetuning/v2_no_onehot/internal_15k_lora_r8_lr1e5/"
  results_dir: "/nlp/scr/salilg/property_tax/results/global_finetuning/v2_no_onehot/internal_15k_lora_r8_lr1e5/"

logging:
  level: "INFO"
