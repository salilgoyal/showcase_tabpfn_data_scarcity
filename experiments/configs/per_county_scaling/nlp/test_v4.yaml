# Per-County Scaling Experiment: tiny + small counties
#
# Trains separate models per county using only that county's historical data.
# Sweeps over training set sizes to build per-county learning curves.
#
# Target: 100 tiny (2-100 rows) + 100 small (100-500 rows) counties from test_v1

experiment:
  type: "per_county_scaling"
  name: "per_county_scaling_test_v4"
  description: "Per-county learning curves for test_v4"
  random_seed: 42

# ==============================================================================
# DATA
# ==============================================================================
data:
  cleaned_data_path: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/"
  target_column: "SALE_AMOUNT"

# ==============================================================================
# SPLITS
# ==============================================================================
splits:
  test_set_dir: "/nlp/scr/salilg/property_tax/preprocessed/v1_no_onehot/test_v4/"

# ==============================================================================
# EXPERIMENT PARAMETERS
# ==============================================================================
target_buckets: ["tiny", "small", "medium"]
train_sizes: [5, 10, 20, 30, 40, 50, 60, 80, 100, 150, 200, 250, 300, 400, 500]
n_seeds: 1

# ==============================================================================
# PREPROCESSING (Phase 2)
# ==============================================================================
preprocessing:
  phase2_steps:
    winsorize: true
    winsorize_percentile: 1
    normalize_continuous: true
    impute_method: "median"

# ==============================================================================
# MODELS
# ==============================================================================
models:
  - name: "tabpfn"
    enabled: true
  - name: "xgboost"
    enabled: true

tabpfn:
  version: "v2"
  device: "cuda"

xgboost:
  optuna_trials: 50
  optuna_cv_folds: 3
  use_gpu: true

# ==============================================================================
# CHECKPOINTING
# ==============================================================================
checkpointing:
  enabled: true
  interval: 50
  resume: true

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  results_dir: "/nlp/scr/salilg/property_tax/results/per_county_scaling/test_v4/"

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  level: "INFO"
