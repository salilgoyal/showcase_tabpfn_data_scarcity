# Preprocessing configuration v1: No one-hot encoding
#
# This config produces a "cleaned" dataset with Phase 1 preprocessing applied.
# Phase 2 preprocessing (normalization, winsorization, imputation) is applied
# per train/test split during experiments to avoid data leakage.

version: "v1_no_onehot"
description: "Cleaned data without one-hot encoding, ready for per-experiment normalization"

# ==============================================================================
# DATA SOURCE
# ==============================================================================
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  target_column: "SALE_AMOUNT"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/county_row_counts.csv"

# ==============================================================================
# DATA FILTERING
# ==============================================================================
# Restrict to high-coverage counties and features
data_filtering:
  counties:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/county_metadata/high_coverage_87_county_list.csv"
  features:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/feature_lists/high_coverage_87_county_features.csv"

# ==============================================================================
# FEATURE SELECTION
# ==============================================================================
# Which feature categories to include
features:
  property_chars: true
  census_bg: false
  census_tract: false
  assessed_value: true  # Keep for baseline comparison (will be excluded during training)
  geographic: false
  temporal: true  # Will generate temporal features from sale_date

# ==============================================================================
# PHASE 1 PREPROCESSING STEPS
# ==============================================================================
# These steps are applied ONCE to the full pooled dataset.
# They are safe (no data leakage risk) because they don't depend on train/test split.

phase1_steps:
  # --- Data Cleaning ---
  # Drop rows where target is null
  drop_null_labels: true

  # Drop columns with only one unique value (including fully null)
  drop_single_value_cols: true

  # Drop columns with < share_non_null fraction of non-null values
  drop_mostly_null_cols: true
  share_non_null: 0.5

  # Drop observations in lowest percentile of sales ratios (suspicious transactions)
  drop_lowest_ratios: true

  # Drop repeat sales, keeping only most recent per property per month
  drop_repeat_sales: true

  # --- Feature Engineering ---
  # Generate temporal features from sale_date
  generate_temporal_features: true

  # --- Categorical Handling ---
  # How to handle categorical columns (since we're NOT one-hot encoding)
  # Options: "label_encode", "drop", "keep_string"
  categorical_handling: "label_encode"

  # --- Target Transformation ---
  # Apply log transformation to target (safe - per-sample operation)
  log_transform_target: true

  # --- Columns to always keep (for identification/splitting) ---
  # These are preserved but not used as features
  keep_id_columns:
    - "fips"  # For county-based train/test splits
    - "CLIP"  # Property identifier

# ==============================================================================
# PHASE 2 PREPROCESSING STEPS (REFERENCE ONLY)
# ==============================================================================
# These are NOT applied during Phase 1 preprocessing.
# They are applied per train/test split during experiments.
# Documenting them here for reference and to ensure config completeness.

phase2_steps:
  # Winsorize continuous features at specified percentiles (fit on train only)
  winsorize: true
  winsorize_percentile: 1

  # Standardize continuous features (fit on train only)
  normalize_continuous: true

  # Impute missing values (fit on train only)
  impute_method: "median"  # Options: "median", "mean", "zero"

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  # Base directory for cleaned datasets
  base_dir: "/scratch/users/salilg/property_tax/preprocessed/"

  # Output format
  format: "parquet"  # Options: "parquet", "feather"

  # Compression for parquet
  compression: "snappy"  # Options: "snappy", "gzip", "none"
