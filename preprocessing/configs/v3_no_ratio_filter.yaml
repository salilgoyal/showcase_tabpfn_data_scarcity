# Preprocessing configuration v3: No one-hot encoding, no ratio filtering
#
# Identical to v2_no_onehot except it does NOT drop the bottom or top 1%
# of MARKET_TOTAL_VALUE / SALE_AMOUNT ratio. Intended for investigating the
# impact of bad rows (anomalous sale price ratios) on model performance.

version: "v3_no_ratio_filter"
description: "Cleaned data without one-hot encoding; retains all ratio outliers for bad-row investigation"

# ==============================================================================
# DATA SOURCE
# ==============================================================================
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  target_column: "SALE_AMOUNT"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/county_row_counts.csv"

# ==============================================================================
# DATA FILTERING
# ==============================================================================
data_filtering:
  counties:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/county_metadata/high_coverage_87_county_list.csv"
  features:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/feature_lists/high_coverage_87_county_features.csv"

# ==============================================================================
# FEATURE SELECTION
# ==============================================================================
features:
  property_chars: true
  census_bg: false
  census_tract: false
  assessed_value: true  # Keep for baseline comparison (will be excluded during training)
  geographic: false
  temporal: true  # Will generate temporal features from sale_date

# ==============================================================================
# PHASE 1 PREPROCESSING STEPS
# ==============================================================================
phase1_steps:
  # --- Data Cleaning ---
  drop_null_labels: true
  drop_single_value_cols: true
  drop_mostly_null_cols: true
  share_non_null: 0.5

  # Do NOT drop ratio outliers — this is the point of this config
  drop_lowest_ratios: false
  drop_highest_ratios: false

  drop_repeat_sales: true

  # --- Feature Engineering ---
  generate_temporal_features: true

  # --- Categorical Handling ---
  categorical_handling: "label_encode"

  # --- Target Transformation ---
  log_transform_target: true

  # --- Columns to always keep (for identification/splitting) ---
  keep_id_columns:
    - "fips"
    - "CLIP"

# ==============================================================================
# PHASE 2 PREPROCESSING STEPS (REFERENCE ONLY)
# ==============================================================================
phase2_steps:
  winsorize: true
  winsorize_percentile: 1
  normalize_continuous: true
  impute_method: "median"

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  base_dir: "/scratch/users/salilg/property_tax/preprocessed/"
  format: "parquet"
  compression: "snappy"
