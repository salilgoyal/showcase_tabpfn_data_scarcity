# Preprocessing configuration v2: No one-hot encoding, with high-ratio filter
#
# Identical to v1_no_onehot except it also drops transactions in the top 1%
# of MARKET_TOTAL_VALUE / SALE_AMOUNT ratio (per sale_year), complementing
# the existing drop_lowest_ratios step which drops the bottom 1% of the same ratio.
#
# Motivation: transactions with very high market-to-sale ratios (e.g. market value
# $1.2M but sold for $11K) represent data quality issues that corrupt training
# labels and inflate test error.

version: "v2_no_onehot"
description: "Cleaned data without one-hot encoding; drops both lowest and highest sales ratio transactions"

# ==============================================================================
# DATA SOURCE
# ==============================================================================
data:
  county_csvs_dir: "/scratch/users/salilg/property_tax/county_csvs/"
  target_column: "SALE_AMOUNT"
  county_metadata_file: "/home/users/salilg/tabpfn_data_scarcity/data/county_row_counts.csv"

# ==============================================================================
# DATA FILTERING
# ==============================================================================
data_filtering:
  counties:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/county_metadata/high_coverage_87_county_list.csv"
  features:
    enabled: false
    source: "file"
    file: "/home/users/salilg/tabpfn_data_scarcity/data/feature_lists/high_coverage_87_county_features.csv"

# ==============================================================================
# FEATURE SELECTION
# ==============================================================================
features:
  property_chars: true
  census_bg: false
  census_tract: false
  assessed_value: true  # Keep for baseline comparison (will be excluded during training)
  geographic: false
  temporal: true  # Will generate temporal features from sale_date

# ==============================================================================
# PHASE 1 PREPROCESSING STEPS
# ==============================================================================
phase1_steps:
  # --- Data Cleaning ---
  drop_null_labels: true
  drop_single_value_cols: true
  drop_mostly_null_cols: true
  share_non_null: 0.5

  # Drop bottom 1% of MARKET_TOTAL_VALUE / SALE_AMOUNT ratio (per sale_year)
  drop_lowest_ratios: true

  # Drop top 1% of MARKET_TOTAL_VALUE / SALE_AMOUNT ratio (per sale_year)
  # Removes transactions where market value >> sale price (likely data errors)
  drop_highest_ratios: true

  drop_repeat_sales: true

  # --- Feature Engineering ---
  generate_temporal_features: true

  # --- Categorical Handling ---
  categorical_handling: "label_encode"

  # --- Target Transformation ---
  log_transform_target: true

  # --- Columns to always keep (for identification/splitting) ---
  keep_id_columns:
    - "fips"
    - "CLIP"

# ==============================================================================
# PHASE 2 PREPROCESSING STEPS (REFERENCE ONLY)
# ==============================================================================
phase2_steps:
  winsorize: true
  winsorize_percentile: 1
  normalize_continuous: true
  impute_method: "median"

# ==============================================================================
# OUTPUT
# ==============================================================================
output:
  base_dir: "/scratch/users/salilg/property_tax/preprocessed/"
  format: "parquet"
  compression: "snappy"
